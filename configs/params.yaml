# ============================================================
# params.yaml — Tham số cấu hình cho toàn bộ pipeline
# ============================================================

# --- Đường dẫn ---
paths:
  raw_data: "data/raw/heart_disease_uci.csv"
  processed_dir: "data/processed"
  figures_dir: "outputs/figures"
  tables_dir: "outputs/tables"
  models_dir: "outputs/models"
  reports_dir: "outputs/reports"

# --- Thông tin dữ liệu ---
data:
  target_col: "num"
  id_col: "id"
  drop_cols: ["id", "dataset"]
  categorical_cols: ["sex", "cp", "fbs", "restecg", "exang", "slope", "thal"]
  numerical_cols: ["age", "trestbps", "chol", "thalch", "oldpeak", "ca"]
  binarize_target: true   # 0 → 0, 1-4 → 1

# --- Seed & Split ---
seed: 42
test_size: 0.2

# --- Cross-validation ---
cv_folds: 5

# --- Mô hình sẽ thử nghiệm ---
model_names:
  - LogisticRegression
  - DecisionTree
  - RandomForest
  - SVM
  - KNN
  - GradientBoosting
  - XGBoost

# --- Hyperparameters grid (GridSearchCV) ---
hyperparams:
  LogisticRegression:
    C: [0.01, 0.1, 1, 10]
  DecisionTree:
    max_depth: [3, 5, 7, 10, null]
    min_samples_split: [2, 5, 10]
  RandomForest:
    n_estimators: [100, 200]
    max_depth: [5, 10, null]
    min_samples_split: [2, 5]
  SVM:
    C: [0.1, 1, 10]
    kernel: ["rbf", "linear"]
  KNN:
    n_neighbors: [3, 5, 7, 11]
    weights: ["uniform", "distance"]
  GradientBoosting:
    n_estimators: [100, 200]
    learning_rate: [0.01, 0.1]
    max_depth: [3, 5]
  XGBoost:
    n_estimators: [100, 200]
    learning_rate: [0.01, 0.1]
    max_depth: [3, 5]

# --- Khai phá tri thức ---
mining:
  association:
    min_support: 0.1
    min_confidence: 0.6
  clustering:
    n_clusters_range: [2, 3, 4, 5, 6, 7]
  anomaly:
    contamination: 0.05

# --- Bán giám sát ---
semi_supervised:
  label_ratios: [0.05, 0.10, 0.20, 0.30]  # 5%, 10%, 20%, 30%
  self_training_threshold: 0.75
  label_spreading_kernel: "rbf"
  label_spreading_gamma: 20
  label_spreading_alpha: 0.2

# --- Hồi quy chỉ số ---
regression:
  target_col: "trestbps"          # Huyết áp lúc nghỉ
  drop_cols: ["id", "dataset", "num"]
  hyperparams:
    Ridge:
      alpha: 1.0
    XGBRegressor:
      n_estimators: 200
      max_depth: 5
      learning_rate: 0.1
